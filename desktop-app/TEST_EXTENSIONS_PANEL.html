<!DOCTYPE html>
<html>
<head>
    <title>Test Extensions Panel</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1e1e2e; color: #cdd6f4; }
        button { padding: 10px 20px; margin: 5px; font-size: 14px; cursor: pointer; }
        pre { background: #181825; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .result { margin: 10px 0; padding: 10px; background: #313244; border-radius: 4px; }
        .success { color: #a6e3a1; }
        .error { color: #f38ba8; }
    </style>
</head>
<body>
    <h1>🔍 Extensions Panel Diagnostics</h1>
    <p>Click buttons below to test the Extensions panel in the main EDITH window</p>
    
    <div>
        <button onclick="test1()">1. Check if ExtensionsManager exists</button>
        <button onclick="test2()">2. Check if panel DOM exists</button>
        <button onclick="test3()">3. Check panel visibility</button>
        <button onclick="test4()">4. Manually show panel</button>
        <button onclick="test5()">5. Check activity button</button>
        <button onclick="test6()">6. Trigger button click</button>
        <button onclick="test7()">7. Check for JavaScript errors</button>
        <button onclick="test8()">8. Initialize ExtensionsManager</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        function clear() {
            document.getElementById('results').innerHTML = '';
        }
        
        function test1() {
            clear();
            try {
                if (typeof window.ExtensionsManager !== 'undefined') {
                    log('✅ ExtensionsManager EXISTS', 'success');
                    log('<pre>' + JSON.stringify(Object.keys(window.ExtensionsManager), null, 2) + '</pre>');
                } else {
                    log('❌ ExtensionsManager NOT FOUND', 'error');
                    log('This means extensions.js did not load or did not expose the module');
                }
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }
        
        function test2() {
            clear();
            try {
                const panel = document.getElementById('panel-extensions');
                if (panel) {
                    log('✅ Panel DOM element EXISTS', 'success');
                    log('Panel classes: ' + panel.className);
                    log('Panel display: ' + window.getComputedStyle(panel).display);
                } else {
                    log('❌ Panel DOM element NOT FOUND', 'error');
                }
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }
        
        function test3() {
            clear();
            try {
                const panel = document.getElementById('panel-extensions');
                if (!panel) {
                    log('❌ Panel not found', 'error');
                    return;
                }
                
                const isActive = panel.classList.contains('active');
                const display = window.getComputedStyle(panel).display;
                
                log('Active class: ' + isActive, isActive ? 'success' : 'error');
                log('Display style: ' + display, display !== 'none' ? 'success' : 'error');
                
                if (!isActive) {
                    log('⚠️ Panel does not have "active" class - this is why it\'s hidden');
                }
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }
        
        function test4() {
            clear();
            try {
                const panel = document.getElementById('panel-extensions');
                if (!panel) {
                    log('❌ Panel not found', 'error');
                    return;
                }
                
                // Remove active from all panels
                document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
                // Add active to extensions panel
                panel.classList.add('active');
                
                log('✅ Manually added "active" class to panel', 'success');
                log('Check the main window - Extensions panel should now be visible!');
                
                setTimeout(() => {
                    const display = window.getComputedStyle(panel).display;
                    log('Panel display after 100ms: ' + display, display !== 'none' ? 'success' : 'error');
                }, 100);
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }
        
        function test5() {
            clear();
            try {
                const button = document.querySelector('[data-panel="extensions"]');
                if (button) {
                    log('✅ Extensions button EXISTS', 'success');
                    log('Button title: ' + button.title);
                    log('Button active: ' + button.classList.contains('active'));
                } else {
                    log('❌ Extensions button NOT FOUND', 'error');
                }
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }
        
        function test6() {
            clear();
            try {
                const button = document.querySelector('[data-panel="extensions"]');
                if (!button) {
                    log('❌ Button not found', 'error');
                    return;
                }
                
                log('Triggering click on Extensions button...', 'info');
                button.click();
                
                setTimeout(() => {
                    const panel = document.getElementById('panel-extensions');
                    const isActive = panel?.classList.contains('active');
                    log('Panel active after click: ' + isActive, isActive ? 'success' : 'error');
                    
                    if (isActive) {
                        log('✅ SUCCESS! Panel should be visible now', 'success');
                    } else {
                        log('❌ Panel still not active after click - check for JS errors', 'error');
                    }
                }, 100);
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
            }
        }
        
        function test7() {
            clear();
            log('Open DevTools Console (F12) and check for errors');
            log('Look for:');
            log('- Script load errors (404)');
            log('- JavaScript execution errors (red text)');
            log('- Warnings about missing modules');
        }
        
        function test8() {
            clear();
            try {
                if (typeof window.ExtensionsManager === 'undefined') {
                    log('❌ ExtensionsManager not found - cannot initialize', 'error');
                    return;
                }
                
                if (typeof window.ExtensionsManager.init === 'function') {
                    log('Calling ExtensionsManager.init()...', 'info');
                    window.ExtensionsManager.init();
                    log('✅ ExtensionsManager.init() called successfully', 'success');
                    log('Check console for "[ExtensionsManager] Initialized with Open VSX"');
                } else {
                    log('❌ ExtensionsManager.init is not a function', 'error');
                }
            } catch(e) {
                log('❌ Error: ' + e.message, 'error');
                log('Stack: ' + e.stack);
            }
        }
    </script>
</body>
</html>
