<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDITH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 420px;
      height: 420px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .splash {
      width: 420px;
      height: 420px;
      background: #ffffff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      color: #000000;
    }

    .loading-text {
      font-size: 14px;
      color: #666666;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-text">EDITH</div>
    <div class="loading-text" id="splash-status">Loading...</div>
  </div>

  <script>
    window.__splashDone = function() {
      document.getElementById('splash-status').textContent = 'Ready!';
    };
  </script>
</body>
</html>
