<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8001 ws://localhost:8001;" />
  <title>EDITH</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="marked.min.js"></script>
</head>

<body>
  <div id="app" class="mode-normal">

    <!-- ═══════════════════════════════════════════════════════
       NAVBAR — full-width, always blue/green
  ═══════════════════════════════════════════════════════ -->
    <nav class="navbar" id="navbar">
      <div class="navbar-left">
        <div class="navbar-logo">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="ng6" cx="40%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#3B82F6" />
                <stop offset="100%" stop-color="#0F172A" />
              </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="48" fill="url(#ng6)" />
            <circle cx="50" cy="50" r="48" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" />
            <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(96,165,250,0.2)" stroke-width="1" />
            <rect x="47" y="8" width="6" height="14" rx="3" fill="#60A5FA" />
            <circle cx="50" cy="7" r="4" fill="#93C5FD" />
            <rect x="20" y="22" width="60" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="#60A5FA"
              stroke-width="1.5" />
            <rect x="9" y="32" width="12" height="18" rx="5" fill="rgba(96,165,250,0.3)" stroke="#60A5FA"
              stroke-width="1" />
            <rect x="79" y="32" width="12" height="18" rx="5" fill="rgba(96,165,250,0.3)" stroke="#60A5FA"
              stroke-width="1" />
            <circle cx="36" cy="42" r="7" fill="rgba(0,229,255,0.15)" stroke="#00E5FF" stroke-width="1.5" />
            <circle cx="64" cy="42" r="7" fill="rgba(0,229,255,0.15)" stroke="#00E5FF" stroke-width="1.5" />
            <circle cx="36" cy="42" r="3.5" fill="#00E5FF" />
            <circle cx="64" cy="42" r="3.5" fill="#00E5FF" />
            <path d="M33 55 Q50 65 67 55" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" fill="none" />
          </svg>
        </div>
        <span class="navbar-name">EDITH</span>
      </div>

      <div class="navbar-right">
        <div class="navbar-status">
          <span class="status-dot"></span>
          <span class="status-text">Online</span>
        </div>
        <button class="navbar-btn" id="btn-settings" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </nav>

    <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT — fills remaining height
  ═══════════════════════════════════════════════════════ -->
    <div class="main" id="main">

      <!-- ── CONVERSATION AREA ─────────────────────────────── -->
      <div class="chat-area" id="chat-area">

        <!-- Welcome (shown before first message) -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon" id="welcome-icon">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="wg6" cx="40%" cy="35%" r="65%">
                  <stop offset="0%" stop-color="#3B82F6" />
                  <stop offset="100%" stop-color="#0F172A" />
                </radialGradient>
              </defs>
              <circle cx="50" cy="50" r="48" fill="url(#wg6)" />
              <circle cx="50" cy="50" r="48" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" />
              <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(96,165,250,0.2)" stroke-width="1" />
              <rect x="47" y="8" width="6" height="14" rx="3" fill="#60A5FA" />
              <circle cx="50" cy="7" r="4" fill="#93C5FD" />
              <rect x="20" y="22" width="60" height="44" rx="10" fill="rgba(255,255,255,0.06)" stroke="#60A5FA"
                stroke-width="1.5" />
              <rect x="9" y="32" width="12" height="18" rx="5" fill="rgba(96,165,250,0.3)" stroke="#60A5FA"
                stroke-width="1" />
              <rect x="79" y="32" width="12" height="18" rx="5" fill="rgba(96,165,250,0.3)" stroke="#60A5FA"
                stroke-width="1" />
              <circle cx="36" cy="42" r="7" fill="rgba(0,229,255,0.15)" stroke="#00E5FF" stroke-width="1.5" />
              <circle cx="64" cy="42" r="7" fill="rgba(0,229,255,0.15)" stroke="#00E5FF" stroke-width="1.5" />
              <circle cx="36" cy="42" r="3.5" fill="#00E5FF" />
              <circle cx="64" cy="42" r="3.5" fill="#00E5FF" />
              <path d="M33 55 Q50 65 67 55" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" fill="none" />
            </svg>
          </div>
          <h1 class="welcome-title" id="welcome-title"></h1>
          <p class="welcome-sub" id="welcome-sub">How may I help you ? </p>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages"></div>

      </div>

      <!-- ── BOTTOM PANEL: mode toggle + input ─────────────── -->
      <div class="bottom-panel" id="bottom-panel">

        <!-- Mode toggle — sits directly above input -->
        <div class="mode-bar" id="mode-bar">
          <div class="mode-seg" id="mode-seg">
            <button class="seg-btn active" id="seg-normal" data-mode="normal">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              </svg>
              Normal
            </button>
            <button class="seg-btn" id="seg-agent" data-mode="agent">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6" />
                <polyline points="8 6 2 12 8 18" />
              </svg>
              Agent
            </button>
          </div>
          <span class="mode-label" id="mode-label">Chat with EDITH</span>
        </div>

        <!-- Input box -->
        <div class="input-wrap" id="input-wrap">
          <div class="input-box" id="input-box">
            <div class="input-tools">
              <button class="tool-btn" id="btn-mic" title="Voice input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                  <line x1="12" y1="19" x2="12" y2="23" />
                  <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
              </button>
              <button class="tool-btn" id="btn-image" title="Upload image">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <circle cx="8.5" cy="8.5" r="1.5" />
                  <polyline points="21 15 16 10 5 21" />
                </svg>
              </button>
              <button class="tool-btn" id="btn-file" title="Attach file">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                </svg>
              </button>
              <div class="tool-sep"></div>
            </div>
            <textarea id="msg-input" placeholder="Message EDITH..." rows="1" autocomplete="off"
              spellcheck="true"></textarea>
            <button class="send-btn" id="btn-send" disabled>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <p class="input-hint">EHANCED · DIGITAL · INTELLIGENT · TECH · HELPER</p>
        </div>

      </div>
    </div>

  </div>

  <input type="file" id="file-img" accept="image/*" style="display:none" />
  <input type="file" id="file-doc" accept=".pdf,.doc,.docx,.txt,.md,.csv,.json" style="display:none" />

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>

</html>
