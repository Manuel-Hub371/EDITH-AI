<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDITH AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Custom Frameless Title Bar -->
    <div id="title-bar" class="title-bar">
        <div class="tb-left">
            <div class="tb-logo-mark">E</div>
            <span class="tb-label">EDITH</span>
        </div>
        <div class="tb-center" id="tb-status">
            <span class="tb-status-dot"></span>
            <span class="tb-status-text">Systems Online</span>
        </div>
        <div class="title-bar-controls">
            <button id="btn-minimize" class="tb-btn" title="Minimize">
                <svg width="10" height="2" viewBox="0 0 10 2" fill="currentColor"><rect width="10" height="2" rx="1"/></svg>
            </button>
            <button id="btn-close" class="tb-btn tb-btn-close" title="Hide to Tray">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Boot Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="boot-logo">E</div>
            <div class="boot-text">Initializing EDITH</div>
            <div class="boot-bar-wrap"><div class="boot-bar"></div></div>
            <p id="loading-status">Connecting to backend services...</p>
        </div>
    </div>

    <!-- Main App Shell -->
    <div class="app-shell">

        <!-- Sliding History Sidebar -->
        <aside id="history-sidebar" class="history-sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Sessions</span>
                <button id="close-sidebar" class="icon-btn" title="Close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="sidebar-search">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" placeholder="Search history..." id="history-search"/>
            </div>
            <div id="session-list" class="session-list">
                <!-- Sessions injected here -->
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Top Bar -->
            <div class="chat-topbar">
                <button id="sidebar-toggle" class="icon-btn" title="History">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="topbar-brand">
                    <span class="brand-name">EDITH</span>
                    <div class="active-badge">
                        <span class="pulse-dot"></span>
                        Active
                    </div>
                </div>
                <button id="new-chat-btn" class="icon-btn" title="New Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>

            <!-- Message Feed -->
            <div id="chat-window" class="message-feed">
                <!-- Greeting -->
                <div id="greeting-placeholder" class="greeting-wrap">
                    <div class="greeting-body">
                        <div class="greeting-avatar">E</div>
                        <h2 class="greeting-title">Hello, Sir.</h2>
                        <p class="greeting-sub">How can I assist you today?</p>
                        <div class="quick-actions">
                            <button class="quick-btn" data-prompt="What's on my Desktop?">📂 Scan Desktop</button>
                            <button class="quick-btn" data-prompt="Open Documents folder">📄 Open Documents</button>
                            <button class="quick-btn" data-prompt="What time is it?">🕐 Current Time</button>
                            <button class="quick-btn" data-prompt="Set volume to 50%">🔊 Set Volume 50%</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="input-zone">
                <div class="input-bar" id="input-bar">
                    <div class="input-tools">
                        <input type="file" id="file-input" style="display:none;">
                        <button id="file-btn" class="input-tool-btn" title="Attach File">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <button id="voice-btn" class="input-tool-btn" title="Voice Input">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                    </div>
                    <form id="chat-form" class="input-form">
                        <textarea id="user-input" placeholder="Message EDITH..." rows="1" autocomplete="off"></textarea>
                        <button type="submit" id="send-btn" title="Send">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </form>
                </div>
                <p class="input-hint">EDITH can make mistakes. Verify critical actions.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
