<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDITH | Project CyberGlass</title>
    <link rel="stylesheet" href="style.css">
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- ============================================================ -->
    <!-- Custom Title Bar (Frameless Electron Window) V39             -->
    <!-- ============================================================ -->
    <div id="title-bar" class="title-bar">
        <span class="title-bar-label">EDITH AI</span>
        <div class="title-bar-controls">
            <button id="btn-minimize" class="tb-btn" title="Minimize">─</button>
            <button id="btn-close" class="tb-btn tb-btn-close" title="Hide to Tray">✕</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- Loading Overlay (Shown until backend is ready) V39           -->
    <!-- ============================================================ -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>EDITH is starting...</h2>
            <p id="loading-status">Connecting to backend services...</p>
        </div>
    </div>

    <div class="hub-container">
        <header class="hub-header">
            <div class="header-left">
                <button id="sidebar-toggle" class="tool-btn" title="History">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="logo">EDITH</h1>
            </div>
            <div class="active-node">
                <span class="pulse-indicator"></span>
                ACTIVE
            </div>
        </header>

        <aside id="history-sidebar" class="history-sidebar">
            <div class="sidebar-header">
                <h3>History</h3>
                <button id="close-sidebar" class="tool-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="session-list" class="session-list">
                <!-- Sessions will be injected here -->
            </div>
        </aside>

        <main class="chat-viewport">
            <div id="chat-window" class="message-container">
                <div id="greeting-placeholder" class="hub-greeting">
                    <div class="greeting-content">
                        <div class="greeting-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                                <circle cx="12" cy="5" r="2"></circle>
                                <path d="M12 7v4"></path>
                                <line x1="8" y1="16" x2="8" y2="16" stroke-width="3"></line>
                                <line x1="16" y1="16" x2="16" y2="16" stroke-width="3"></line>
                            </svg>
                        </div>
                        <h2>Hello, Sir. How may I assist you today?</h2>
                        <p>Systems are operational. Your workspace is synchronized.</p>
                    </div>
                </div>
            </div>
        </main>

        <section class="floating-controls">
            <div class="input-hub">
                <div class="hub-tools">
                    <input type="file" id="file-input" style="display: none;">
                    <button id="file-btn" class="tool-btn" title="Attach Files">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                    </button>
                    <button id="voice-btn" class="tool-btn" title="Voice Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button id="new-chat-btn" class="tool-btn" title="New Chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>

                <form id="chat-form" class="hub-form">
                    <input type="text" id="user-input" placeholder="Initiate a thread..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polyline points="22 2 15 22 11 13 2 9 22 2"></polyline>
                        </svg>
                    </button>
                </form>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
